<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>PANEL PIDRI.XX3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0; padding:0; text-align:center; font-family:"Segoe UI", Tahoma, sans-serif;
      color:#fff;
      background:url("6765645a3c36ac769ca8cda0cffff9a4.jpg") no-repeat center center fixed;
      background-size:cover;
      overflow-x:hidden;
    }

    /* العنوان */
    .panel-title {
      display:inline-block;
      margin-top:60px;
      margin-bottom:70px;
      padding:30px 80px;
      font-size:64px; /* أكبر */
      font-weight:bold;
      text-transform:uppercase;
      letter-spacing:6px;
      font-family:"Orbitron", sans-serif;
      color:#00f;
      border:3px solid #6a00ff;
      border-radius:20px;
      background:rgba(0,0,0,0.6);
      box-shadow:0 0 35px #6a00ff, 0 0 60px #000 inset;
      animation:titleGlow 4s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
      from { text-shadow:0 0 30px #007bff; }
      to { text-shadow:0 0 60px #ff0000; }
    }

    /* الصورة الدائرية */
    .profile-pic {
      width:280px; height:280px; /* أكبر */
      border-radius:50%;
      border:4px solid #007bff;
      margin-bottom:70px;
      animation:glowPic 5s infinite alternate, floatPic 8s ease-in-out infinite;
    }
    @keyframes glowPic {
      0% { box-shadow:0 0 30px #007bff; }
      50% { box-shadow:0 0 40px #ff0000; }
      100% { box-shadow:0 0 50px #6a00ff; }
    }
    @keyframes floatPic {
      0% { transform:translateY(0); }
      50% { transform:translateY(-12px); }
      100% { transform:translateY(0); }
    }
